<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B4EA2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="Domestic Air – Equipment Health Check Form">
  <title>Equipment Health Check – Domestic Air</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <img id="company-logo" src="" alt="Domestic Air" onerror="this.style.display='none'">
    <div class="header-text">
      <h1 id="form-title">Equipment Health Check</h1>
      <p id="form-subtitle">Loading…</p>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>

    <!-- Progress -->
    <div class="progress-bar-wrap" role="progressbar" aria-label="Form completion">
      <div class="progress-bar" style="width:0%"></div>
    </div>

    <!-- Validation banner -->
    <div class="validation-banner" id="validation-banner" role="alert">
      Please complete all required fields (marked with *) before submitting.
    </div>

    <!-- Form -->
    <form id="health-check-form" novalidate>

      <!-- Dynamic sections injected here by form.js -->
      <div id="form-sections">
        <div class="loading-wrap">
          <div class="spinner"></div>
          <p>Loading form…</p>
        </div>
      </div>

      <!-- Sticky action bar -->
      <div class="form-actions">
        <button type="button" id="save-btn" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Save Locally
        </button>

        <button type="submit" id="submit-btn" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Submit Report
        </button>
      </div>

    </form>
  </main>

  <!-- ── Toast container ── -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- ── Success modal ── -->
  <div id="success-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
    <div class="modal-box">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h2 id="modal-heading">Report Submitted!</h2>
      <p>
        Your health check report has been submitted successfully.<br>
        A copy has been emailed to the office and logged to the tracking spreadsheet.
      </p>
      <button id="modal-close-btn" class="modal-btn">Start New Report</button>
    </div>
  </div>

  <!-- Config files (edit these to change questions and settings) -->
  <script src="config/settings.js"></script>
  <script src="config/questions.js"></script>

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Form logic -->
  <script src="js/form.js"></script>

</body>
</html>
